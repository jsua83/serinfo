name: Auto Update Index

on:
  push:
    paths:
      - '**.html'
      - '!index.html'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repository
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for accurate file history if needed

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update_index.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update index.html with new sermons" && git push)
