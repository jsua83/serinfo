<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정재학 말씀 인덱스 - 통합 자료실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .dashboard-card { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .img-hover-zoom img { transition: transform 0.5s ease; }
        .img-hover-zoom:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="p-6 sm:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- 헤더 영역 -->
        <header class="mb-10 border-b pb-6 border-slate-200 flex flex-col items-center justify-center text-center">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 tracking-tight w-full flex justify-center items-center flex-wrap gap-2">
                <span class="inline-block">📖</span>
                <span>정재학 설교 인포 그래픽 자료실</span>
                <span class="inline-block">📖</span>
            </h1>
            <p class="text-slate-500 mt-3 text-lg text-center w-full">원하는 말씀문서와 그래픽을 클릭하세요.</p>
        </header>

        <!-- 통합 데이터 그리드 -->
        <div id="dashboard-container" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- 자바스크립트를 통해 여기에 목록이 삽입됩니다. -->
        </div>
        
        <footer class="mt-16 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>© 정재학 말씀 인덱스. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // 요한복음 11 설교를 문서 1개로 수정하고, 전체 데이터 구조를 통일했습니다.
        const sermonData = [
            { 
                series: "요한복음 설교 11", 
                passage: "요한복음 4장 27절~42절", 
                title: "영의 양식이 있습니까?",
                docs: [{ file: "John042742.html" }],
                images: [
                    { title: "핵심 그래픽", file: "John042742info.png" },
                    { title: "요약", file: "John042742info1.png" }
                ]
            },
            { 
                series: "요한복음 설교 10", passage: "요한복음 4장 21절~26절", title: "신령과 진정으로",
                docs: [{ file: "John042126.html" }],
                images: [{ title: "핵심 그래픽", file: "John042126info.png" }, { title: "요약", file: "John042126info1.png" }]
            },
            { 
                series: "요한복음 설교 09", passage: "요한복음 4장 3절~15절", title: "사마리아여인, 은혜와 변화", 
                docs: [{ file: "John040315.html" }], 
                images: [{ title: "핵심 그래픽", file: "John040315info.jpg" }, { title: "요약", file: "John040315info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 08", passage: "요한복음 3장 22절~36절", title: "기쁨을 빼앗기지 않는 비결", 
                docs: [{ file: "John032236.html" }], 
                images: [{ title: "핵심 그래픽", file: "John032236info.jpg" }, { title: "요약", file: "John032236info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 07", passage: "요한복음 3장 1절~21절", title: "반드시 거듭나야 하리라", 
                docs: [{ file: "John030121.html" }], 
                images: [{ title: "핵심 그래픽", file: "John030121info.jpg" }, { title: "요약", file: "John030121info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 06", passage: "요한복음 2장 13절~25절", title: "성전을 깨끗게 하신 예수님", 
                docs: [{ file: "John021325.html" }], 
                images: [{ title: "핵심 그래픽", file: "John021325info.jpg" }, { title: "요약", file: "John021325info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 05", passage: "요한복음 2장 1절~11절", title: "물이 변하여 포도주 됐네", 
                docs: [{ file: "John020111.html" }], 
                images: [{ title: "핵심 그래픽", file: "John020111info.jpg" }, { title: "요약", file: "John020111info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 04", passage: "요한복음 1장 43절~51절", title: "나를 따르라!", 
                docs: [{ file: "John014351.html" }], 
                images: [{ title: "핵심 그래픽", file: "John014351info.jpg" }, { title: "요약", file: "John014351info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 03", passage: "요한복음 1장 35절~42절", title: "무엇을 구하느냐? 와서 보라!", 
                docs: [{ file: "John013542.html" }], 
                images: [{ title: "핵심 그래픽", file: "John013542info.jpg" }, { title: "요약", file: "John013542info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 02", passage: "요한복음 1장 19절~42절", title: "보라, 믿으라, 따르라", 
                docs: [{ file: "John011942.html" }], 
                images: [{ title: "핵심 그래픽", file: "John011942info.jpg" }, { title: "요약", file: "John011942info1.jpg" }] 
            },
            { 
                series: "요한복음 설교 01", passage: "요한복음 1장 1절~18절", title: "예수, 가장 귀한 그 이름", 
                docs: [{ file: "John010118.html" }], 
                images: [{ title: "핵심 그래픽", file: "John010118info.jpg" }, { title: "요약", file: "John010118info1.jpg" }] 
            },
            { 
                series: "누가복음 설교 04", passage: "누가복음 1장 39절~80절", title: "마리아와 엘리사벳의 만남", 
                docs: [{ file: "luke013980praiserelay.html" }], 
                images: [{ title: "핵심 그래픽", file: "luke013980praiserelayinfo.jpg" }, { title: "요약", file: "luke013980praiserelayinfo1.jpg" }] 
            },
            { 
                series: "누가복음 설교 03", passage: "누가복음 1장 18절~38절", title: "은혜를 대하는 믿음의 자세", 
                docs: [{ file: "luke011838gracefaith.html" }], 
                images: [{ title: "핵심 그래픽", file: "luke011838gracefaithinfo.jpg" }, { title: "요약", file: "luke011838gracefaithinfo1.jpg" }] 
            },
            { 
                series: "누가복음 설교 02", passage: "누가복음 1장 5절~17절", title: "어둠을 바꾸는 하나님의 시간", 
                docs: [{ file: "luke010517time.html" }], 
                images: [{ title: "핵심 그래픽", file: "luke010517timeinfo.jpg" }, { title: "요약", file: "luke010517timeinfo1.jpg" }] 
            },
            { 
                series: "누가복음 설교 01", passage: "누가복음 1장 1절~4절", title: "더 확실하게", 
                docs: [{ file: "luke010104fact.html" }], 
                images: [{ title: "핵심 그래픽", file: "luke010104factinfo.jpg" }, { title: "요약", file: "luke010104factinfo1.jpg" }] 
            }
        ];

        function getBadgeClass(seriesName) {
            return seriesName.includes("누가복음") ? "bg-sky-100 text-sky-700" : "bg-indigo-100 text-indigo-700";
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '';

            sermonData.forEach(item => {
                const badgeClass = getBadgeClass(item.series);
                
                // 1. HTML 문서 링크 (더 나은 UI 문구 제안 적용)
                let docsHtml = '';
                item.docs.forEach(doc => {
                    docsHtml += `
                        <a href="${doc.file}" target="_blank" class="group flex items-center justify-between w-full bg-slate-50 hover:bg-blue-50 border border-slate-200 hover:border-blue-400 text-slate-700 hover:text-blue-700 rounded-lg p-3 mb-2 transition-all">
                            <span class="text-[15px] font-bold flex items-center gap-2">
                                📖 말씀 문서 보기
                            </span>
                            <span class="text-xs font-semibold text-blue-600 bg-blue-100 px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">
                                클릭
                            </span>
                        </a>
                    `;
                });

                // 2. 이미지 갤러리 영역 (더 나은 UI 문구 제안 적용)
                let imagesHtml = '';
                if (item.images && item.images.length > 0) {
                    const gridClass = item.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                    
                    let imageGridHtml = '';
                    item.images.forEach(img => {
                        imageGridHtml += `
                            <a href="${img.file}" target="_blank" class="block relative rounded-lg overflow-hidden border border-slate-200 img-hover-zoom aspect-[4/3] bg-slate-100 group">
                                <img src="${img.file}" alt="${img.title}" class="w-full h-full object-cover" 
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                <div class="hidden absolute inset-0 flex items-center justify-center text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                </div>
                                <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-60 text-white text-xs text-center py-1 font-medium">
                                    ${img.title}
                                </div>
                            </a>
                        `;
                    });
                    
                    imagesHtml = `
                        <div class="mt-4 pt-4 border-t border-slate-100">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-sm text-slate-700 font-bold flex items-center gap-1">
                                    🎨 말씀 인포그래픽
                                </span>
                                <span class="text-xs text-slate-400 font-medium">클릭하여 확대</span>
                            </div>
                            <div class="grid ${gridClass} gap-2">
                                ${imageGridHtml}
                            </div>
                        </div>
                    `;
                }

                // 3. 최종 통합 카드 조립
                const cardHtml = `
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm dashboard-card p-5 flex flex-col h-full">
                        <div class="mb-3">
                            <span class="text-xs font-bold px-2.5 py-1 rounded-md ${badgeClass}">
                                ${item.series}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-1 leading-tight break-keep">
                            ${item.title}
                        </h3>
                        <p class="text-slate-500 text-sm font-medium mb-5">
                            ${item.passage}
                        </p>
                        
                        <div class="mt-auto">
                            ${docsHtml}
                            ${imagesHtml}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
