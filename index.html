        // 🌟 이미지 모달 함수
        function openModal(imageSrc) {
            document.getElementById('modal-image').src = imageSrc;
            document.getElementById('image-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.body.style.overflow = 'auto'; 
        }

        // 🌟 HTML 문서 모달 함수
        function openHtmlModal(docSrc) {
            document.getElementById('modal-iframe').src = docSrc;
            document.getElementById('html-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closeHtmlModal() {
            document.getElementById('html-modal').classList.add('hidden');
            document.getElementById('modal-iframe').src = ''; 
            document.body.style.overflow = 'auto'; 
        }

        // 🌟 뱃지 색상 지정 함수 (마태복음 전용 초록색 추가!)
        function getBadgeClass(seriesName) {
            if (seriesName.includes("누가복음")) return "bg-sky-100 text-sky-700";
            if (seriesName.includes("마태복음") || seriesName.includes("부활주일")) return "bg-pink-100 text-pink-700";
            return "bg-indigo-100 text-indigo-700"; // 기본값 (요한복음)
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '';

            sermonData.forEach(item => {
                const badgeClass = getBadgeClass(item.series);
                
                // 1. 이미지 갤러리 영역
                let imagesHtml = '';
                if (item.images && item.images.length > 0) {
                    const gridClass = item.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                    
                    let imageGridHtml = '';
                    item.images.forEach(img => {
                        imageGridHtml += `
                            <button onclick="openModal('${img.file}')" class="w-full text-left block relative rounded-lg overflow-hidden border border-slate-200 img-hover-zoom aspect-[4/3] bg-slate-100 group focus:outline-none">
                                <img src="${img.file}" alt="${img.title}" class="w-full h-full object-cover" 
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                
                                <div class="hidden absolute inset-0 flex-col items-center justify-center bg-slate-50 p-2 text-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="text-slate-300 mb-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span class="text-[10px] text-red-500 font-mono break-all leading-tight">
                                        <b>${img.file}</b><br>확인 필요
                                    </span>
                                </div>

                                <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-60 text-white text-xs text-center py-1.5 font-medium">
                                    ${img.title}
                                </div>
                            </button>
                        `;
                    });
                    
                    imagesHtml = `
                        <div class="mb-5">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-slate-700 font-bold flex items-center gap-1">
                                    🎨 말씀 인포그래픽
                                </span>
                                <span class="text-[11px] text-slate-400 font-medium">클릭하여 확대</span>
                            </div>
                            <div class="grid ${gridClass} gap-2">
                                ${imageGridHtml}
                            </div>
                        </div>
                    `;
                }

                // 2. 문서 및 구글 드라이브 자료 링크 영역
                let linksHtml = '';
                if (item.links && item.links.length > 0) {
                    let buttonsHtml = '';
                    item.links.forEach(link => {
                        const isHtml = link.file.toLowerCase().endsWith('.html');
                        
                        if (isHtml) {
                            buttonsHtml += `
                                <button onclick="openHtmlModal('${link.file}')" class="w-full text-left group flex items-center justify-between border rounded-lg p-2.5 mb-2 transition-all focus:outline-none ${link.colorClass}">
                                    <span class="text-[14px] font-bold flex items-center gap-2">
                                        ${link.title}
                                    </span>
                                    <span class="text-[11px] font-semibold opacity-70 group-hover:opacity-100 transition-opacity">
                                        창으로 열기 ↗
                                    </span>
                                </button>
                            `;
                        } else {
                            buttonsHtml += `
                                <a href="${link.file}" target="_blank" class="group flex items-center justify-between w-full border rounded-lg p-2.5 mb-2 transition-all ${link.colorClass}">
                                    <span class="text-[14px] font-bold flex items-center gap-2">
                                        ${link.title}
                                    </span>
                                    <span class="text-[11px] font-semibold opacity-70 group-hover:opacity-100 transition-opacity">
                                        열기 ↗
                                    </span>
                                </a>
                            `;
                        }
                    });

                    linksHtml = `
                        <div class="mt-auto pt-4 border-t border-slate-100">
                            <span class="text-sm text-slate-700 font-bold flex items-center gap-1 mb-3">
                                🗂️ 관련 자료 모음
                            </span>
                            ${buttonsHtml}
                        </div>
                    `;
                }

                // 3. 최종 통합 카드 조립
                const cardHtml = `
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm dashboard-card p-5 flex flex-col h-full">
                        <div class="mb-4">
                            <span class="text-xs font-bold px-2.5 py-1 rounded-md ${badgeClass}">
                                ${item.series}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-1 leading-tight break-keep">
                            ${item.title}
                        </h3>
                        <p class="text-slate-500 text-sm font-medium mb-5">
                            ${item.passage}
                        </p>
                        
                        <div>
                            ${imagesHtml}
                        </div>
                        
                        ${linksHtml}
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // ESC 키를 누르면 모든 팝업창이 닫히도록 기능 유지
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
                closeHtmlModal();
            }
        });

        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
